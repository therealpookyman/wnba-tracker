name: wnba-tracker

on:
  schedule:
    # hourly ~55min windows, 11:50am ET matinees through ~2am ET late finishes;
    # GitHub cron skips/delays are common, so windows overlap-queue for resilience
    - cron: '50 15-23 * * *'
    - cron: '50 0-5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python runner.py
