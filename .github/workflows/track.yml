name: wnba-tracker

on:
  schedule:
    # four ~3h windows covering 11:50 ET matinees through ~1am ET late games
    - cron: '50 15 * * *'
    - cron: '50 18 * * *'
    - cron: '50 21 * * *'
    - cron: '50 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 185
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python runner.py
